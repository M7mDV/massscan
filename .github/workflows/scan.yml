name: Masscan Port Scanner

on:
  workflow_dispatch:  # تشغيل يدوي
  schedule:
    - cron: '0 0 * * 0'  # أسبوعي (كل أحد الساعة 12 ص)

jobs:
  masscan-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Masscan
        run: |
          sudo apt-get update
          sudo apt-get install -y masscan

      - name: Check IP list exists
        run: |
          if [ ! -f ip ]; then
            echo "Error: File 'ip' not found in repository root"
            exit 1
          fi

      - name: Run Masscan Scan
        run: |
          sudo masscan -iL ip -p1-10000 --rate 2000 -oL scan.txt
          echo "Scan completed. Results:"
          cat scan.txt

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: masscan-results
          path: scan.txt

      - name: Send results to Discord
        if: always()
        run: |
          SCAN_RESULTS=$(cat scan.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          SCAN_COUNT=$(wc -l < scan.txt)
          
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"username\": \"Masscan Bot\",
              \"avatar_url\": \"https://i.imgur.com/4M34hi2.png\",
              \"embeds\": [{
                \"title\": \"🔍 Masscan Port Scan Complete\",
                \"color\": 3447003,
                \"fields\": [
                  {
                    \"name\": \"📋 Scan Details\",
                    \"value\": \"**Target:** \`ip\` file\n**Ports:** 1-10000\n**Rate:** 2000\n**Results Count:** \`${SCAN_COUNT}\`\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"📝 Raw Results\",
                    \"value\": \"\`\`\`\\n${SCAN_RESULTS}\\n\`\`\`\",
                    \"inline\": false
                  }
                ],
                \"footer\": {
                  \"text\": \"Masscan Scanner | $(date -u +'%Y-%m-%d %H:%M UTC')\"
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
